<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning — Grande Pharmacie de Villeurbanne</title>
<link rel="stylesheet" href="shared.css">
<style>
/* ── TODAY CARD ──────────────────────────────────────────────────── */
.today-card{
  background:linear-gradient(135deg,var(--g1) 0%,var(--g2) 100%);
  border-radius:var(--r12);padding:18px;margin-bottom:16px;color:#fff;
  box-shadow:0 4px 20px rgba(10,107,56,.25);
}
.today-card h3{font-size:13px;font-weight:600;opacity:.8;margin-bottom:10px;letter-spacing:.02em;}
.today-pres-grid{display:flex;flex-wrap:wrap;gap:8px;}
.tpc{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border-radius:var(--r8);padding:7px 10px;}
.tpc-name{font-size:12px;font-weight:600;}
.tpc-hours{font-size:11px;opacity:.7;font-family:var(--ffm);}
.tpc-absent{background:rgba(255,100,100,.18);}
.today-closed{text-align:center;padding:10px;opacity:.6;font-size:13px;}

/* ── PLANNING TABLE ──────────────────────────────────────────────── */
.wtbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--r8);}
.wtbl{width:100%;border-collapse:separate;border-spacing:0;min-width:580px;}
.wtbl thead tr th{
  background:var(--g1);color:rgba(255,255,255,.9);
  padding:10px 8px;font-size:10px;font-weight:600;text-align:center;
  letter-spacing:.04em;text-transform:uppercase;
  position:sticky;top:0;z-index:10;
}
.wtbl thead tr th:first-child{
  text-align:left;padding-left:14px;min-width:130px;
  background:var(--surf3);color:var(--n5);
  border-right:1px solid var(--bdr);
}
.th-today{background:var(--g2) !important;}
.th-off{opacity:.35;}
.wtbl tbody tr{border-bottom:1px solid var(--bdr);}
.wtbl tbody tr:last-child{border-bottom:none;}
.wtbl tbody td{padding:8px;vertical-align:top;background:var(--surf);}
.wtbl tbody td:first-child{
  background:var(--surf2);padding:10px 14px;vertical-align:middle;
  border-right:1px solid var(--bdr);min-width:130px;
}
.td-today{background:#f0fdf4 !important;}
.td-off{background:var(--surf2) !important;opacity:.4;}
.emp-n{font-size:12px;font-weight:600;line-height:1.3;white-space:nowrap;}
.emp-s{font-size:10px;color:var(--n6);margin-top:2px;line-height:1.3;}
.wtbl tbody tr:hover td{background:#fafcfa;}
.wtbl tbody tr:hover td:first-child{background:var(--surf3);}
.wtbl tbody tr:hover .td-today{background:#e8faf0 !important;}

/* ── CHIP INSIDE TABLE ────────────────────────────────────────────── */
.tbl-chip{
  font-size:10px;padding:3px 6px;border-radius:4px;
  font-weight:600;white-space:nowrap;display:block;
  line-height:1.4;font-family:var(--ffm);
  margin-bottom:2px;
}
.tbl-chip:last-child{margin-bottom:0;}

/* ── INTÉRIMAIRES ROW ────────────────────────────────────────────── */
.int-row td{background:var(--ol) !important;}
.int-row td:first-child{background:var(--ol) !important;}
.int-row .emp-n{color:var(--o1);}
.int-row .emp-s{color:var(--o2);}

/* ── ABSENCES SECTION ────────────────────────────────────────────── */
.ab-wrap{margin-top:16px;}
.ab-cards{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.ab-card{
  background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r10);
  padding:10px 14px;display:flex;align-items:center;gap:10px;
  box-shadow:var(--sh1);
}
.ab-info{min-width:0;}
.ab-name{font-size:12px;font-weight:600;}
.ab-type{margin-top:2px;}

/* ── PAGE HEADER ─────────────────────────────────────────────────── */
.page-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.page-hd h2{font-size:16px;font-weight:700;letter-spacing:-.01em;}
.page-hd p{font-size:12px;color:var(--n5);margin-top:2px;}

/* ── LÉGENDE ─────────────────────────────────────────────────────── */
.legend{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;background:var(--surf2);border-top:1px solid var(--bdr);border-radius:0 0 var(--r12) var(--r12);}

@media(max-width:640px){
  .wtbl{min-width:460px;}
  .wtbl thead tr th:first-child,.wtbl tbody td:first-child{min-width:90px;padding-left:10px;padding-right:10px;}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-brand">
    <div class="cross">✚</div>
    <span class="name">Grande Pharmacie de Villeurbanne</span>
  </div>
  <div class="hdr-right">
    <span class="hpill green">Planning</span>
    <span class="sync-dot" id="sync-dot" title="Connexion..."></span>
    <button class="hbtn" onclick="location.reload()">↻</button>
    <a href="index.html" class="hbtn">← Accueil</a>
  </div>
</header>

<div class="page">
  <!-- Présences du jour -->
  <div class="today-card" id="today-card"></div>

  <div class="page-hd">
    <div>
      <h2>Planning de la semaine</h2>
      <p id="today-date"></p>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="wk(-1)">‹</button>
      <span class="nav-lbl" id="wlbl"></span>
      <button class="nav-btn" onclick="wk(1)">›</button>
    </div>
  </div>

  <div class="card" style="margin-bottom:16px;">
    <div class="card-b" style="padding-bottom:0;">
      <div class="wtbl-wrap">
        <table class="wtbl" id="wtbl"></table>
      </div>
    </div>
    <div class="legend">
      <span class="chip c-ph">Pharmacien·ne</span>
      <span class="chip c-pr">Préparateur·rice</span>
      <span class="chip c-alt">Alternant·e</span>
      <span class="chip c-int">Intérimaire</span>
      <span class="chip c-cg">Congé</span>
      <span class="chip c-ab">Absent·e</span>
      <span class="chip c-gd">Garde</span>
    </div>
  </div>

  <div class="ab-wrap">
    <div class="sec-title">Absences & congés cette semaine</div>
    <div class="ab-cards" id="abrow"></div>
  </div>
</div>

<script src="shared.js"></script>
<script>
let woff=0;
const today=new Date();
const MO_FULL=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DS_FULL=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];

document.getElementById('today-date').textContent=
  'Aujourd\'hui : '+DS_FULL[today.getDay()]+' '+today.getDate()+' '+MO_FULL[today.getMonth()]+' '+today.getFullYear();

function renderToday(){
  const d2=dayAllShifts(today);
  const card=document.getElementById('today-card');
  const dow=today.getDay();
  const MO3=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  const dateStr=DS_FULL[dow]+' '+today.getDate()+' '+MO3[today.getMonth()];

  if(d2.ferie){card.innerHTML=`<h3>📅 Aujourd'hui — ${dateStr}</h3><div class="today-closed">Jour férié 🎉 — La pharmacie est fermée</div>`;return;}
  if(dow===0){card.innerHTML=`<h3>📅 Aujourd'hui — Dimanche</h3><div class="today-closed">La pharmacie est fermée</div>`;return;}

  let html=`<h3>📅 Présences aujourd'hui — ${dateStr}</h3><div class="today-pres-grid">`;
  d2.present.forEach(x=>{
    html+=`<div class="tpc">
      <div class="av" style="background:rgba(255,255,255,.2);color:#fff;width:26px;height:26px;font-size:9px;">${x.emp.sh}</div>
      <div><div class="tpc-name">${x.emp.name.split(' ')[0]}</div><div class="tpc-hours">${x.sh.s}–${x.sh.e}</div></div>
    </div>`;
  });
  d2.interims.forEach(i=>{
    html+=`<div class="tpc">
      <div class="av" style="background:rgba(255,255,255,.15);color:#fff;width:26px;height:26px;font-size:8px;">INT</div>
      <div><div class="tpc-name">${i.name.split(' ')[0]}</div><div class="tpc-hours">${i.s}–${i.e}</div></div>
    </div>`;
  });
  if(d2.conge.length){
    html+=`<div style="flex-basis:100%;font-size:11px;opacity:.65;margin-top:2px;">En congé/absent : ${d2.conge.map(c=>c.emp.name.split(' ')[0]).join(', ')}</div>`;
  }
  if(!d2.present.length&&!d2.interims.length){
    html+='<span class="today-closed">Aucune présence enregistrée</span>';
  }
  html+='</div>';
  card.innerHTML=html;
}

function render(){
  const days=weekDays(woff);
  const f=days[0],l=days[6];
  const MO3=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  document.getElementById('wlbl').textContent=f.getDate()+' '+MO3[f.getMonth()]+' – '+l.getDate()+' '+MO3[l.getMonth()];
  const tbl=document.getElementById('wtbl');
  const DS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];

  // HEADER
  let hr='<thead><tr><th style="text-align:left;">Employé·e</th>';
  days.forEach(d=>{
    const iT=dk(d)===dk(today),isDim=d.getDay()===0,isF=isFerie(d);
    const off=isDim||isF;
    hr+=`<th class="${iT?'th-today':''} ${off?'th-off':''}" style="min-width:75px;white-space:nowrap;">
      <div style="font-size:9px;opacity:.75;">${DS[d.getDay()]}</div>
      <div style="font-size:16px;font-weight:700;line-height:1.2;">${d.getDate()}</div>
      ${isDim?'<div style="font-size:8px;opacity:.6;">Fermé</div>':isF?'<div style="font-size:8px;opacity:.6;">Férié</div>':''}
    </th>`;
  });
  hr+='</tr></thead>';

  // BODY
  let body='<tbody>';
  TEAM.forEach(emp=>{
    body+=`<tr>
      <td>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="av" style="background:${emp.bg};color:${emp.color};width:26px;height:26px;font-size:9px;">${emp.sh}</div>
          <div>
            <div class="emp-n">${emp.name.split(' ')[0]}<span style="font-weight:400;color:var(--n5);"> ${emp.name.split(' ').slice(1).join(' ')}</span></div>
            <div class="emp-s">${emp.label}</div>
          </div>
        </div>
      </td>`;
    days.forEach(d=>{
      const iT=dk(d)===dk(today),isDim=d.getDay()===0,isF=isFerie(d);
      const off=isDim||isF;
      if(off){body+=`<td class="${iT?'td-today':''} td-off"></td>`;return;}
      const sh=empShifts(d,emp.id);
      body+=`<td class="${iT?'td-today':''}">`;
      if(sh){
        if(sh.type==='conge') body+=`<span class="tbl-chip c-cg">Congé</span>`;
        else if(sh.type==='absent') body+=`<span class="tbl-chip c-ab">Absent</span>`;
        else if(sh.type==='garde') body+=`<span class="tbl-chip c-gd">Garde</span>`;
        else body+=`<span class="tbl-chip ${ROLE_CLS[emp.role]||'c-alt'}">${sh.s}–${sh.e}</span>`;
      }
      body+='</td>';
    });
    body+='</tr>';
  });

  // Intérimaires
  const d2=db();const names=new Set();
  days.forEach(d=>{(d2.interims[dk(d)]||[]).forEach(i=>names.add(i.name));});
  if(names.size){
    body+=`<tr><td colspan="8" style="padding:6px 14px;font-size:10px;font-weight:700;color:var(--o1);background:var(--ol);text-transform:uppercase;letter-spacing:.06em;">Intérimaires</td></tr>`;
    names.forEach(n=>{
      body+=`<tr class="int-row"><td><div class="emp-n">${n}</div><div class="emp-s">Intérimaire</div></td>`;
      days.forEach(d=>{
        const k2=dk(d),iT=dk(d)===dk(today);
        const s=(d2.interims[k2]||[]).find(i=>i.name===n);
        body+=`<td class="${iT?'td-today':''}">${s?`<span class="tbl-chip c-int">${s.s}–${s.e}</span>`:''}</td>`;
      });
      body+='</tr>';
    });
  }
  body+='</tbody>';

  tbl.innerHTML=hr+body;

  // Absences
  const ab=document.getElementById('abrow');ab.innerHTML='';
  const seenAbs=new Set();
  days.forEach(d=>{
    if(d.getDay()===0||isFerie(d))return;
    TEAM.forEach(emp=>{
      const sh=empShifts(d,emp.id);
      if(sh&&(sh.type==='conge'||sh.type==='absent')&&!seenAbs.has(emp.id)){
        seenAbs.add(emp.id);
        ab.innerHTML+=`<div class="ab-card">
          <div class="av" style="background:${emp.bg};color:${emp.color};width:32px;height:32px;font-size:10px;">${emp.sh}</div>
          <div class="ab-info">
            <div class="ab-name">${emp.name}</div>
            <div class="ab-type"><span class="chip ${sh.type==='conge'?'c-cg':'c-ab'}">${sh.type==='conge'?'Congé':'Absent·e'}</span></div>
          </div>
        </div>`;
      }
    });
  });
  if(!ab.children.length)ab.innerHTML='<span style="color:var(--n6);font-size:13px;">Aucune absence cette semaine ✓</span>';
}

function wk(d){woff+=d;render();}

document.addEventListener('DOMContentLoaded',()=>{
  dbLoad().then(()=>{render();renderToday();});
  onDbChange(()=>{render();renderToday();});
});
</script>
</body>
</html>
