<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Planning</title>
<link rel="stylesheet" href="../shared.css">
<style>
/* ── HERO EMPLOYÉ ─────────────────────────────────────────────────── */
.emp-hero{
  background:linear-gradient(135deg, var(--g0) 0%, #0d4525 60%, var(--g2) 100%);
  border-radius:var(--r12);padding:20px;margin-bottom:16px;
  display:flex;align-items:center;gap:16px;color:#fff;
  box-shadow:0 4px 20px rgba(5,46,22,.3);
}
.emp-av-lg{
  width:56px;height:56px;border-radius:50%;
  background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.25);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;flex-shrink:0;
  font-family:var(--ffm);
}
.emp-hi h2{font-size:18px;font-weight:700;letter-spacing:-.01em;}
.emp-hi p{font-size:12px;opacity:.65;margin-top:3px;}
.emp-today-sh{
  margin-left:auto;text-align:right;
  background:rgba(255,255,255,.12);border-radius:var(--r8);
  padding:8px 12px;flex-shrink:0;
}
.emp-today-sh .sh-label{font-size:10px;opacity:.6;margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em;}
.emp-today-sh .sh-time{font-size:15px;font-weight:700;font-family:var(--ffm);}

/* ── POINTAGE CARD ───────────────────────────────────────────────── */
.pt-card{background:var(--surf);border-radius:var(--r12);border:1px solid var(--bdr);padding:18px;margin-bottom:14px;box-shadow:var(--sh2);}
.pt-card-hd{font-size:14px;font-weight:700;margin-bottom:4px;}
.pt-date-txt{font-size:12px;color:var(--n5);margin-bottom:14px;font-family:var(--ffm);}
.arr-banner{background:var(--al);border:1px solid var(--am);border-radius:var(--r8);padding:10px 13px;font-size:12px;color:var(--a1);margin-bottom:14px;font-weight:500;line-height:1.5;}
.ptbtns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.pbtn{
  border:2px solid transparent;border-radius:var(--r10);
  padding:18px 10px;font-size:13px;font-weight:700;
  cursor:pointer;font-family:var(--ff);
  display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:all .15s;
}
.pbtn:hover:not(.done){transform:translateY(-2px);box-shadow:var(--sh3);}
.p-arr{background:var(--gl);color:var(--g0);border-color:var(--gm);}
.p-dep{background:var(--bl);color:var(--b1);border-color:var(--bm);}
.pbtn.done{opacity:.4;cursor:not-allowed;transform:none !important;box-shadow:none !important;border-style:dashed;}
.pbtn svg{width:28px;height:28px;}
.pbtn small{font-size:11px;font-weight:500;opacity:.8;font-family:var(--ffm);}
.pstatus{background:var(--surf2);border-radius:var(--r10);padding:14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.psi{text-align:center;}
.psl{font-size:10px;color:var(--n5);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:4px;}
.psv{font-size:20px;font-weight:700;font-family:var(--ffm);}
.psv.a{color:var(--g1);}
.psv.d{color:var(--b1);}
.psv.t{color:var(--n3);font-size:16px;}
.psv.nil{color:var(--n7);font-size:15px;font-weight:400;}

/* ── STATS ───────────────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r10);padding:14px;box-shadow:var(--sh1);}
.stat-l{font-size:10px;color:var(--n5);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:6px;}
.stat-v{font-size:24px;font-weight:700;letter-spacing:-.02em;line-height:1;}
.stat-s{font-size:12px;color:var(--n5);margin-top:4px;}

/* ── SEMAINE GRID ────────────────────────────────────────────────── */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px;}
.dbox{background:var(--surf2);border-radius:var(--r8);padding:10px 4px;text-align:center;border:1.5px solid transparent;transition:border-color .15s;}
.dbox.today{background:var(--gl);border-color:var(--gm);}
.dbox.work{background:var(--surf);border-color:var(--bdr);}
.dbox.leave{background:var(--rl);border-color:var(--rm);}
.dbox.ferie{background:var(--pl);border-color:transparent;opacity:.7;}
.d-lbl{font-size:9px;color:var(--n5);font-weight:700;text-transform:uppercase;margin-bottom:3px;}
.d-num{font-size:14px;font-weight:700;margin-bottom:3px;line-height:1;}
.d-sh{font-size:9px;color:var(--g1);font-weight:600;font-family:var(--ffm);}
.d-off{font-size:9px;color:var(--n6);}
.d-cg{font-size:9px;color:var(--r1);font-weight:600;}
.d-fe{font-size:9px;color:var(--p1);font-weight:600;}

/* ── HISTORIQUE ──────────────────────────────────────────────────── */
.hist-item{
  display:grid;grid-template-columns:auto 1fr 1fr auto;
  align-items:center;gap:10px;padding:10px 12px;
  background:var(--surf2);border-radius:var(--r8);margin-bottom:5px;
}
.h-date{font-size:12px;font-weight:600;white-space:nowrap;color:var(--n2);}
.h-arr{color:var(--g1);font-size:12px;font-weight:600;font-family:var(--ffm);}
.h-dep{color:var(--b1);font-size:12px;font-weight:600;font-family:var(--ffm);}
.h-dur{font-size:11px;font-weight:700;background:var(--surf3);padding:3px 8px;border-radius:var(--rfull);white-space:nowrap;font-family:var(--ffm);}

/* ── DEMANDES ────────────────────────────────────────────────────── */
.rq-sec{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r12);padding:18px;box-shadow:var(--sh2);}
.rq-sec h3{font-size:14px;font-weight:700;margin-bottom:14px;}
.btn-send{background:var(--g2);color:#fff;border:none;border-radius:var(--r8);padding:11px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--ff);margin-top:10px;width:100%;transition:background .15s;}
.btn-send:hover{background:var(--g1);}
.my-reqs{margin-top:14px;border-top:1px solid var(--bdr);padding-top:14px;}
.my-req-item{background:var(--surf2);border-radius:var(--r8);padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid var(--bdr);}
.mri-info{font-size:13px;font-weight:500;}
.mri-det{font-size:12px;color:var(--n5);margin-top:2px;}

@media(max-width:640px){
  /* Hero */
  .emp-hero{padding:14px;gap:12px;}
  .emp-av-lg{width:44px;height:44px;font-size:14px;}
  .emp-hi h2{font-size:15px;}
  .emp-today-sh{display:none;}

  /* Pointage */
  .pt-card{padding:14px;}
  .pbtn{padding:14px 8px;font-size:12px;}
  .pbtn svg{width:22px;height:22px;}
  .pstatus{grid-template-columns:1fr 1fr 1fr;gap:6px;}
  .psl{font-size:9px;}
  .psv{font-size:16px;}

  /* Stats */
  .stats-grid{grid-template-columns:1fr 1fr;}
  .stat-v{font-size:20px;}

  /* Semaine : scroll horizontal sur très petits écrans */
  .week-grid{grid-template-columns:repeat(7,1fr);gap:2px;}
  .dbox{padding:7px 2px;}
  .d-lbl{font-size:8px;}
  .d-num{font-size:12px;}
  .d-sh,.d-off,.d-cg,.d-fe{font-size:8px;}

  /* Historique */
  .hist-item{grid-template-columns:auto 1fr auto;gap:6px;padding:8px;}
  .h-dep{display:none;}
  .h-date{font-size:11px;}
  .h-arr{font-size:11px;}
  .h-dur{font-size:10px;padding:2px 6px;}

  /* Demandes */
  .rq-sec{padding:14px;}
  .f2{grid-template-columns:1fr;}

  /* Notif banners */
  .notif-banner{padding:10px 12px;}
  .nb-title{font-size:12px;}
}
@media(max-width:380px){
  .week-grid{overflow-x:auto;display:flex;flex-wrap:nowrap;gap:2px;}
  .dbox{flex-shrink:0;min-width:40px;padding:7px 3px;}
  .stats-grid{grid-template-columns:1fr 1fr;}
}

/* ── NOTIF BANNER EMPLOYÉ ─────────────────────────────────────────── */
.notif-banners{margin-bottom:12px;}
.notif-banner{
  display:flex;align-items:center;gap:10px;
  border-radius:var(--r10);padding:12px 14px;
  margin-bottom:8px;border:1px solid transparent;
  animation:fadeUp .3s ease both;
  position:relative;
}
.notif-banner.approved{background:var(--gl);border-color:var(--gm);color:var(--g0);}
.notif-banner.refused{background:var(--rl);border-color:var(--rm);color:var(--r1);}
.nb-ico{font-size:18px;flex-shrink:0;}
.nb-body{flex:1;min-width:0;}
.nb-title{font-size:13px;font-weight:700;line-height:1.3;}
.nb-sub{font-size:12px;opacity:.8;margin-top:2px;}
.nb-close{background:none;border:none;cursor:pointer;opacity:.5;font-size:16px;padding:2px;line-height:1;flex-shrink:0;color:inherit;}
.nb-close:hover{opacity:1;}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-brand">
    <div class="cross">✚</div>
    <span class="name" id="hdr-name">Chargement...</span>
  </div>
  <div class="hdr-right">
    <span class="sync-dot" id="sync-dot" title="Connexion..."></span>
    <button class="hbtn" onclick="location.reload()">↻</button>
    <a href="../index.html" class="hbtn">← Accueil</a>
  </div>
</header>

<div class="page" id="page"></div>

<script>const SLUG='bennoui';</script>
<script src="../shared.js"></script>
<script>
// SLUG est défini dans chaque fichier employé (remplacé à la génération)
// const SLUG = 'afriyie'; ← sera défini avant ce script dans chaque page

document.addEventListener('DOMContentLoaded',()=>{
  dbLoad().then(()=>render());
  onDbChange(()=>render());
});

function render(){
  const ME=TEAM.find(e=>e.slug===SLUG);
  if(!ME){document.getElementById('page').innerHTML='<p class="empty">Employé introuvable</p>';return;}
  document.title=ME.name+' — Planning';
  document.getElementById('hdr-name').textContent=ME.name;

  const today=new Date(),k2=dk(today),d2=db();
  const pt=((d2.pt||{})[k2]||{})[ME.id]||{};
  const days=weekDays(0);
  const MO=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const DS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const DF=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];

  let totalMin=0,wkDays=0;
  days.forEach(d=>{
    if(d.getDay()===0||isFerie(d))return;
    const sh=empShifts(d,ME.id);
    if(sh&&sh.s&&sh.e&&sh.type!=='conge'&&sh.type!=='absent'){
      const[h1,m1]=sh.s.split(':').map(Number),[h2,m2]=sh.e.split(':').map(Number);
      totalMin+=(h2*60+m2)-(h1*60+m1);wkDays++;
    }
  });
  const hrs=(totalMin/60).toFixed(1);

  // Créneau du jour
  const todayShift=(today.getDay()>0&&!isFerie(today))?empShifts(today,ME.id):null;
  let todayShiftHtml='';
  if(todayShift&&todayShift.s){todayShiftHtml=`<div class="emp-today-sh"><div class="sh-label">Aujourd'hui</div><div class="sh-time">${todayShift.s}–${todayShift.e}</div></div>`;}
  else if(todayShift&&todayShift.type){todayShiftHtml=`<div class="emp-today-sh"><div class="sh-label">Aujourd'hui</div><div class="sh-time" style="font-size:12px;opacity:.7;">En congé</div></div>`;}

  const page=document.getElementById('page');
  page.innerHTML=`
  ${renderNotifBanners(ME)}
  <div class="emp-hero fade-up">
    <div class="emp-av-lg" style="background:rgba(255,255,255,.18);color:#fff;">${ME.sh}</div>
    <div class="emp-hi"><h2>${ME.name}</h2><p>${ME.label}</p></div>
    ${todayShiftHtml}
  </div>

  <div class="pt-card">
    <div class="pt-card-hd">⏱ Pointage du jour</div>
    <div class="pt-date-txt" id="ptdate-txt"></div>
    <div class="arr-banner">⚡ <strong>Arrondi 30 min :</strong> 0–14 min → :00 · 15–44 min → :30 · 45–59 min → heure suivante</div>
    <div class="ptbtns">
      <button class="pbtn p-arr${pt.ar?' done':''}" id="btn-arr" onclick="pointer('arr')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        Pointer arrivée
        <small id="arr-hint">${pt.ar?'✓ '+pt.ar:''}</small>
      </button>
      <button class="pbtn p-dep${pt.dr?' done':''}" id="btn-dep" onclick="pointer('dep')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        Pointer départ
        <small id="dep-hint">${pt.dr?'✓ '+pt.dr:''}</small>
      </button>
    </div>
    <div class="pstatus">
      <div class="psi"><div class="psl">Arrivée</div><div class="psv ${pt.ar?'a':'nil'}" id="pv-arr">${pt.ar||'—'}</div></div>
      <div class="psi"><div class="psl">Départ</div><div class="psv ${pt.dr?'d':'nil'}" id="pv-dep">${pt.dr||'—'}</div></div>
      <div class="psi"><div class="psl">Durée</div><div class="psv t" id="pv-dur">${pt.ar&&pt.dr?tdiff(pt.ar,pt.dr):'—'}</div></div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-l">Heures semaine</div><div class="stat-v">${hrs}<span style="font-size:14px;font-weight:500;color:var(--n5);">h</span></div><div class="stat-s">prévues</div></div>
    <div class="stat-card"><div class="stat-l">Jours travaillés</div><div class="stat-v">${wkDays}</div><div class="stat-s">cette semaine</div></div>
  </div>

  <div class="card card-b" style="margin-bottom:14px;">
    <div style="font-size:13px;font-weight:700;margin-bottom:12px;">Ma semaine</div>
    <div class="week-grid">${renderWeek(days,ME,DS,DF)}</div>
  </div>

  <div class="card card-b" style="margin-bottom:14px;">
    <div style="font-size:13px;font-weight:700;margin-bottom:10px;">Historique — 7 jours</div>
    <div id="hist">${renderHist(ME,DS)}</div>
  </div>

  <div class="rq-sec">
    <h3>📋 Demande de congé / absence</h3>
    <div class="f2" style="margin-bottom:10px;">
      <div class="fg"><label>Type</label>
        <select id="rq-type">
          <option value="conge">Congé</option>
          <option value="absent">Absence</option>
          <option value="garde">Garde</option>
          <option value="horaire">Horaire spécial</option>
        </select>
      </div>
      <div class="fg"><label>Message</label><input type="text" id="rq-msg" placeholder="Précisions..."></div>
    </div>
    <div class="f2">
      <div class="fg"><label>Date début</label><input type="date" id="rq-d1" value="${fi(today)}"></div>
      <div class="fg"><label>Date fin</label><input type="date" id="rq-d2" value="${fi(today)}"></div>
    </div>
    <button class="btn-send" onclick="submitReq('${ME.id}')">Envoyer la demande →</button>
    <div class="my-reqs">
      <div class="sec-title" style="margin-bottom:10px;">Mes demandes</div>
      <div id="my-reqs">${renderMyReqs(ME)}</div>
    </div>
  </div>`;

  document.getElementById('ptdate-txt').textContent=
    DF[today.getDay()]+' '+today.getDate()+' '+MO[today.getMonth()]+' '+today.getFullYear();
}

function renderWeek(days,ME,DS,DF){
  const today=new Date();
  return days.map(d=>{
    const iT=dk(d)===dk(today),isDim=d.getDay()===0,isF=isFerie(d);
    if(isDim)return`<div class="dbox"><div class="d-lbl">Dim</div><div class="d-num">${d.getDate()}</div><div class="d-off">Ferm.</div></div>`;
    if(isF)return`<div class="dbox ferie"><div class="d-lbl">${DS[d.getDay()]}</div><div class="d-num">${d.getDate()}</div><div class="d-fe">Férié</div></div>`;
    const sh=empShifts(d,ME.id);
    const isLeave=sh&&(sh.type==='conge'||sh.type==='absent');
    const isWork=sh&&sh.s&&!isLeave;
    const cls='dbox'+(iT?' today':isLeave?' leave':isWork?' work':'');
    const content=isLeave?`<div class="d-cg">${sh.type==='conge'?'Congé':'Absent'}</div>`:isWork?`<div class="d-sh">${sh.s}–${sh.e}</div>`:`<div class="d-off">Repos</div>`;
    return`<div class="${cls}"><div class="d-lbl">${DS[d.getDay()]}</div><div class="d-num">${d.getDate()}</div>${content}</div>`;
  }).join('');
}

function renderHist(ME,DS){
  const today=new Date(),d2=db();let html='';
  for(let i=6;i>=0;i--){
    const d=new Date(today);d.setDate(today.getDate()-i);
    const k2=dk(d),pt=((d2.pt||{})[k2]||{})[ME.id];
    if(!pt||(!pt.ar&&!pt.dr))continue;
    const dur=pt.ar&&pt.dr?tdiff(pt.ar,pt.dr):null;
    const isT=dk(d)===dk(today);
    html+=`<div class="hist-item">
      <span class="h-date">${isT?"Aujourd'hui":DS[d.getDay()]+' '+d.getDate()+'/'+String(d.getMonth()+1).padStart(2,'0')}</span>
      <span class="h-arr">${pt.ar?'▶ '+pt.ar:'—'}</span>
      <span class="h-dep">${pt.dr?'⏹ '+pt.dr:'—'}</span>
      ${dur?`<span class="h-dur">${dur}</span>`:'<span></span>'}
    </div>`;
  }
  return html||'<p class="empty">Aucun pointage cette semaine</p>';
}

function renderMyReqs(ME){
  const d2=db();
  const mine=(d2.requests||[]).filter(r=>r.empId===ME.id);
  if(!mine.length)return'<p class="empty">Aucune demande</p>';
  const TL={conge:'Congé',absent:'Absence',garde:'Garde',horaire:'Horaire'};
  const STS={pending:'⏳ En attente',approved:'✅ Approuvé',refused:'❌ Refusé'};
  const STCLS={pending:'badge-wait',approved:'badge-ok',refused:'badge-no'};
  return[...mine].reverse().map(r=>`
    <div class="my-req-item">
      <div>
        <div class="mri-info">${TL[r.type]||r.type} · ${r.start}${r.end&&r.end!==r.start?' → '+r.end:''}</div>
        ${r.msg?`<div class="mri-det">${r.msg}</div>`:''}
      </div>
      <span class="${STCLS[r.status]}">${STS[r.status]}</span>
    </div>`).join('');
}

function pointer(type){
  const ME=TEAM.find(e=>e.slug===SLUG);if(!ME)return;
  const now=new Date(),k2=dk(now),raw=ft(now),rounded=r30(raw);
  const d2=idb();
  if(!d2.pt[k2])d2.pt[k2]={};
  if(!d2.pt[k2][ME.id])d2.pt[k2][ME.id]={};
  const pt=d2.pt[k2][ME.id];
  if(type==='arr'){
    if(pt.ar){toast('Arrivée déjà pointée : '+pt.ar,'err');return;}
    pt.araw=raw;pt.ar=rounded;sdb(d2);
    toast('✓ Arrivée '+raw+' → payée à '+rounded);
    document.getElementById('btn-arr').classList.add('done');
    document.getElementById('arr-hint').textContent='✓ '+rounded;
    document.getElementById('pv-arr').textContent=rounded;document.getElementById('pv-arr').className='psv a';
  }else{
    if(!pt.ar){toast("Pointez d'abord votre arrivée",'err');return;}
    if(pt.dr){toast('Départ déjà pointé : '+pt.dr,'err');return;}
    pt.draw=raw;pt.dr=rounded;sdb(d2);
    toast('✓ Départ '+raw+' → payé à '+rounded);
    document.getElementById('btn-dep').classList.add('done');
    document.getElementById('dep-hint').textContent='✓ '+rounded;
    document.getElementById('pv-dep').textContent=rounded;document.getElementById('pv-dep').className='psv d';
    document.getElementById('pv-dur').textContent=tdiff(pt.ar,rounded);
  }
}

function submitReq(empId){
  const ME=TEAM.find(e=>e.slug===SLUG);if(!ME)return;
  const type=document.getElementById('rq-type').value;
  const s=document.getElementById('rq-d1').value,e=document.getElementById('rq-d2').value;
  const msg=document.getElementById('rq-msg').value;
  if(!s||!e){toast('Renseignez les dates','err');return;}
  const d2=idb();
  d2.requests.push({id:d2.rid++,empId:ME.id,type,start:s,end:e,msg,status:'pending'});
  sdb(d2);
  document.getElementById('rq-msg').value='';
  document.getElementById('my-reqs').innerHTML=renderMyReqs(ME);
  toast('Demande envoyée ✓ — en attente d\'approbation');
}

// ── NOTIFICATIONS EMPLOYÉ (Firestore-synced) ────────────────────────────
function renderNotifBanners(ME){
  const d2=db();
  const TL={conge:'Congé',absent:'Absence',garde:'Garde',horaire:'Horaire spécial'};
  const seen=new Set(((d2.empSeen||{})[SLUG])||[]);
  const mine=(d2.requests||[]).filter(r=>r.empId===ME.id&&r.status!=='pending');
  const unseen=mine.filter(r=>!seen.has('resp_'+r.id));
  if(!unseen.length)return'<div class="notif-banners" id="notif-banners" style="display:none;"></div>';
  const html=unseen.map(r=>{
    const cls=r.status==='approved'?'approved':'refused';
    const ico=r.status==='approved'?'✅':'❌';
    const verb=r.status==='approved'?'approuvée':'refusée';
    return '<div class="notif-banner '+cls+'" id="nb_'+r.id+'"><span class="nb-ico">'+ico+'</span><div class="nb-body"><div class="nb-title">Demande '+verb+'</div><div class="nb-sub">'+(TL[r.type]||r.type)+' · '+r.start+(r.end&&r.end!==r.start?' → '+r.end:'')+'</div></div><button class="nb-close" onclick="dismissNotif('+r.id+')" title="Fermer">✕</button></div>';
  }).join('');
  return '<div class="notif-banners" id="notif-banners">'+html+'</div>';
}

function dismissNotif(rid){
  const d2=idb();
  if(!d2.empSeen)d2.empSeen={};
  if(!d2.empSeen[SLUG])d2.empSeen[SLUG]=[];
  const key='resp_'+rid;
  if(!d2.empSeen[SLUG].includes(key))d2.empSeen[SLUG].push(key);
  sdb(d2);
  const el=document.getElementById('nb_'+rid);
  if(el){el.style.opacity='0';el.style.transform='translateY(-4px)';el.style.transition='all .2s';setTimeout(()=>{el.remove();const wrap=document.getElementById('notif-banners');if(wrap&&!wrap.children.length)wrap.style.display='none';},200);}
}

</script>
</body>
