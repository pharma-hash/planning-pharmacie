<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grande Pharmacie de Villeurbanne</title>
<link rel="stylesheet" href="shared.css">
<style>
/* ── HERO ────────────────────────────────────────────────────────── */
.hero{
  background:linear-gradient(155deg, var(--g0) 0%, #0d3d20 55%, #0a5c35 100%);
  padding:36px 20px 28px;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 70% 0%, rgba(74,222,128,.12) 0%, transparent 60%);
  pointer-events:none;
}
.hero-inner{max-width:1140px;margin:0 auto;position:relative;}
.hero-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:var(--rfull);padding:4px 12px;font-size:11px;font-weight:600;color:rgba(255,255,255,.8);margin-bottom:16px;letter-spacing:.04em;}
.hero-tag::before{content:'✚';font-size:10px;}
.hero h1{font-size:clamp(22px,5vw,32px);font-weight:700;color:#fff;line-height:1.2;margin-bottom:6px;letter-spacing:-.02em;}
.hero p{font-size:14px;color:rgba(255,255,255,.55);font-weight:400;}
.hero-meta{display:flex;align-items:center;gap:10px;margin-top:18px;}
.hero-time{font-size:12px;color:rgba(255,255,255,.5);font-family:var(--ffm);}
.hero-status{display:flex;align-items:center;gap:6px;background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.25);border-radius:var(--rfull);padding:4px 10px;font-size:11px;font-weight:600;color:var(--g4);}
.hero-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--g4);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ── CONTENT ─────────────────────────────────────────────────────── */
.content{max-width:1140px;margin:0 auto;padding:20px;}

/* ── QUICK ACCESS ────────────────────────────────────────────────── */
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.qa-card{
  background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r12);
  padding:18px;cursor:pointer;text-decoration:none;color:inherit;
  display:flex;align-items:center;gap:14px;
  box-shadow:var(--sh2);transition:all .2s;
}
.qa-card:hover{box-shadow:var(--sh3);border-color:var(--bdr2);transform:translateY(-1px);}
.qa-icon{
  width:44px;height:44px;border-radius:var(--r10);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.qa-body{flex:1;min-width:0;}
.qa-body h3{font-size:14px;font-weight:600;color:var(--n1);margin-bottom:2px;}
.qa-body p{font-size:12px;color:var(--n5);line-height:1.4;}
.qa-arr{color:var(--n6);font-size:18px;flex-shrink:0;}

/* ── TODAY STRIP ─────────────────────────────────────────────────── */
.today-strip{
  background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r12);
  padding:16px;margin-bottom:24px;box-shadow:var(--sh2);
}
.today-strip-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.today-strip-hd h3{font-size:13px;font-weight:600;color:var(--n2);}
.today-strip-date{font-size:12px;color:var(--n5);font-family:var(--ffm);}
.today-pres{display:flex;flex-wrap:wrap;gap:8px;}
.tp-emp{
  display:flex;align-items:center;gap:8px;
  background:var(--surf2);border-radius:var(--r8);
  padding:7px 10px;min-width:0;
}
.tp-emp.absent{background:var(--rl);opacity:.7;}
.tp-name{font-size:12px;font-weight:600;}
.tp-hours{font-size:11px;color:var(--n5);font-family:var(--ffm);}
.closed-msg{text-align:center;padding:16px;color:var(--n5);font-size:13px;}

/* ── TEAM GRID ───────────────────────────────────────────────────── */
.team-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.team-hd h2{font-size:14px;font-weight:600;color:var(--n2);}
.emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
.emp-card{
  background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r12);
  padding:14px;display:flex;align-items:center;gap:12px;
  text-decoration:none;color:inherit;
  box-shadow:var(--sh1);transition:all .2s;
}
.emp-card:hover{box-shadow:var(--sh3);border-color:var(--bdr2);transform:translateY(-1px);}
.emp-info{flex:1;min-width:0;}
.emp-info h4{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.emp-info p{font-size:11px;color:var(--n5);margin-top:2px;}
.emp-info .emp-hours{font-size:11px;color:var(--g2);font-weight:600;font-family:var(--ffm);margin-top:3px;}
.emp-arr{color:var(--n7);font-size:16px;}

/* ── ROLE GROUPS ─────────────────────────────────────────────────── */
.role-section{margin-bottom:20px;}
.role-label{
  display:flex;align-items:center;gap:8px;
  font-size:10px;font-weight:700;color:var(--n6);
  text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:8px;padding-bottom:6px;
  border-bottom:1px solid var(--bdr);
}

@media(max-width:640px){
  .qa-grid{grid-template-columns:1fr;}
  .emp-grid{grid-template-columns:1fr 1fr;}
  .hero{padding:24px 14px 20px;}
}
@media(max-width:380px){
  .emp-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-brand">
    <div class="cross">✚</div>
    <span class="name">Grande Pharmacie de Villeurbanne</span>
  </div>
  <div class="hdr-right">
    <span class="sync-dot" id="sync-dot" title="Connexion..."></span>
    <button class="hbtn" onclick="location.reload()">↻</button>
  </div>
</header>

<div class="hero">
  <div class="hero-inner">
    <h1>Grande Pharmacie<br>de Villeurbanne</h1>
    <p>Espace de gestion du personnel</p>
    <div class="hero-meta">
      <div class="hero-status" id="status-txt">Chargement...</div>
      <span class="hero-time" id="hero-time"></span>
    </div>
  </div>
</div>

<div class="content">

  <!-- Accès rapide -->
  <div style="margin-bottom:8px" class="sec-title">Accès rapide</div>
  <div class="qa-grid">
    <a href="planning.html" class="qa-card">
      <div class="qa-icon" style="background:var(--gl);color:var(--g1);">📅</div>
      <div class="qa-body">
        <h3>Planning Équipe</h3>
        <p>Vue hebdomadaire de toute l'équipe</p>
      </div>
      <span class="qa-arr">›</span>
    </a>
    <a href="admin.html" class="qa-card">
      <div class="qa-icon" style="background:var(--bl);color:var(--b1);">⚙️</div>
      <div class="qa-body">
        <h3>Espace Admin</h3>
        <p>Gérer horaires, pointages, congés</p>
      </div>
      <span class="qa-arr">›</span>
    </a>
  </div>

  <!-- Présences du jour -->
  <div class="today-strip" id="today-strip"></div>

  <!-- Équipe -->
  <div class="team-hd">
    <h2>Mon profil</h2>
  </div>
  <div id="team-list"></div>
</div>

<script src="shared.js"></script>
<script>
// ── HEURE LIVE ─────────────────────────────────────────────────────
function updateTime(){
  const now=new Date();
  document.getElementById('hero-time').textContent=
    String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
}
updateTime();setInterval(updateTime,30000);

// ── STATUT PHARMACIE ───────────────────────────────────────────────
function updateStatus(){
  const now=new Date(),dow=now.getDay(),h=now.getHours();
  const el=document.getElementById('status-txt');
  if(dow===0||isFerie(now)){el.textContent='Fermée aujourd\'hui';el.style.color='#fca5a5';return;}
  const open=(dow===6)?(h>=9&&h<19):(h>=8&&h<19);
  el.textContent=open?'Ouverte maintenant':'Fermée';
  if(!open)el.style.color='rgba(255,255,255,.5)';
}
updateStatus();

// ── PRÉSENCES DU JOUR ──────────────────────────────────────────────
function renderToday(){
  const today=new Date(),strip=document.getElementById('today-strip');
  const dow=today.getDay(),df=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const mo=['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'];
  const dateStr=df[dow]+' '+today.getDate()+' '+mo[today.getMonth()];

  if(dow===0||isFerie(today)){
    strip.innerHTML=`<div class="today-strip-hd"><h3>📅 Aujourd'hui — ${dateStr}</h3></div><div class="closed-msg">La pharmacie est fermée 🌿</div>`;
    return;
  }
  const d2=dayAllShifts(today);
  let html=`<div class="today-strip-hd"><h3>📅 Présents aujourd'hui</h3><span class="today-strip-date">${dateStr}</span></div><div class="today-pres">`;
  d2.present.forEach(x=>{
    html+=`<div class="tp-emp">
      <div class="av" style="background:${x.emp.bg};color:${x.emp.color};width:28px;height:28px;font-size:10px;">${x.emp.sh}</div>
      <div><div class="tp-name">${x.emp.fn||.name.split(' ')[0]}</div><div class="tp-hours">${x.sh.s}–${x.sh.e}</div></div>
    </div>`;
  });
  d2.interims.forEach(i=>{
    html+=`<div class="tp-emp">
      <div class="av" style="background:var(--ol);color:var(--o1);width:28px;height:28px;font-size:9px;">INT</div>
      <div><div class="tp-name">${i.fn||.name.split(' ')[0]}</div><div class="tp-hours">${i.s}–${i.e}</div></div>
    </div>`;
  });
  if(d2.conge.length){
    html+=`<div style="flex-basis:100%;font-size:11px;color:var(--r2);font-weight:500;margin-top:4px;">En congé : ${d2.conge.map(c=>c.emp.fn||.name.split(' ')[0]).join(', ')}</div>`;
  }
  if(!d2.present.length&&!d2.interims.length){
    html+='<span style="color:var(--n5);font-size:13px;">Aucune présence enregistrée</span>';
  }
  html+='</div>';
  strip.innerHTML=html;
}

// ── ÉQUIPE PAR RÔLE ────────────────────────────────────────────────
function renderTeam(){
  const today=new Date(),dow=today.getDay();
  const groups=[
    {role:'ph',label:'Pharmaciennes',icon:'💊'},
    {role:'pr',label:'Préparatrices',icon:'🧪'},
    {role:'alt',label:'Alternants',icon:'📚'},
  ];
  const list=document.getElementById('team-list');
  let html='';
  groups.forEach(g=>{
    const members=TEAM.filter(e=>e.role===g.role);
    if(!members.length)return;
    html+=`<div class="role-section">
      <div class="role-label">${g.icon} ${g.label}</div>
      <div class="emp-grid">`;
    members.forEach(e=>{
      const sh=(dow>0&&dow<7&&!isFerie(today))?empShifts(today,e.id):null;
      let hoursHtml='';
      if(sh&&sh.s)hoursHtml=`<div class="emp-hours">${sh.s}–${sh.e}</div>`;
      else if(sh&&sh.type)hoursHtml=`<div class="emp-hours" style="color:var(--r2)">En congé</div>`;
      else if(dow>0&&dow<7)hoursHtml=`<div class="emp-hours" style="color:var(--n6)">Repos</div>`;

      html+=`<a href="employe/${e.slug}.html" class="emp-card">
        <div class="av" style="background:${e.bg};color:${e.color};width:38px;height:38px;font-size:12px;">${e.sh}</div>
        <div class="emp-info">
          <h4>${e.name}</h4>
          <p>${e.label}</p>
          ${hoursHtml}
        </div>
        <span class="emp-arr">›</span>
      </a>`;
    });
    html+='</div></div>';
  });
  list.innerHTML=html;
}

document.addEventListener('DOMContentLoaded',()=>{
  dbLoad().then(()=>{renderToday();renderTeam();});
  onDbChange(()=>{renderToday();renderTeam();});
});
</script>
</body>
</html>
